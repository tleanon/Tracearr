apiVersion: v1
kind: Service
metadata:
  name: {{ include "tracearr.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tracearr.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: {{ .Values.tracearr.service.type }}
  ports:
    - name: http
      port: {{ .Values.tracearr.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "tracearr.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
