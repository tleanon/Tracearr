{{- if .Values.tracearr.imageCache.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "tracearr.fullname" . }}-image-cache
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tracearr.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  accessModes: [ReadWriteOnce]
  {{- if .Values.tracearr.imageCache.storageClass }}
  storageClassName: {{ .Values.tracearr.imageCache.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.tracearr.imageCache.size }}
{{- end }}
