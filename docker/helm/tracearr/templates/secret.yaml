{{- if not .Values.secrets.existingSecret }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "tracearr.secretName" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracearr.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tracearr.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{- if and $existing $existing.data (not .Values.secrets.jwtSecret) }}
  JWT_SECRET: {{ index $existing.data "JWT_SECRET" }}
  {{- else if and .Values.secrets.autoGenerate (eq .Values.secrets.jwtSecret "") }}
  JWT_SECRET: {{ randAlphaNum 64 | b64enc | quote }}
  {{- else }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  {{- end }}
  {{- if and $existing $existing.data (not .Values.secrets.cookieSecret) }}
  COOKIE_SECRET: {{ index $existing.data "COOKIE_SECRET" }}
  {{- else if and .Values.secrets.autoGenerate (eq .Values.secrets.cookieSecret "") }}
  COOKIE_SECRET: {{ randAlphaNum 64 | b64enc | quote }}
  {{- else }}
  COOKIE_SECRET: {{ .Values.secrets.cookieSecret | b64enc | quote }}
  {{- end }}
  DB_PASSWORD: {{ .Values.secrets.dbPassword | b64enc | quote }}
{{- end }}
